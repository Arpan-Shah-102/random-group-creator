<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Random Group Creator</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="./assets/icon.png">
    </head>

    <body>
        <header>
            <h1>Random Group Creator</h1>
        </header>
        <main>
            <section class="input-section">
                <h2>Add People</h2>
                <p class="input-description">Enter names (one per line) or upload a CSV file</p>

                <div class="input-methods">
                    <div class="tab-buttons">
                        <button class="tab-btn active" data-tab="textarea">Type Names</button>
                        <button class="tab-btn" data-tab="csv">Upload CSV</button>
                    </div>

                    <div class="tab-content active" id="textarea-tab">
                        <textarea id="names-input" rows="10" placeholder="Enter names, one per line&#10;&#10;John Smith&#10;Jane Doe&#10;Bob Johnson"></textarea>
                    </div>

                    <div class="tab-content" id="csv-tab">
                        <label for="csv-upload" class="csv-upload-label">
                            <span class="upload-icon">📁</span>
                            <span class="upload-text">Choose a CSV file</span>
                            <span class="file-name" id="file-name">No file chosen</span>
                        </label>
                        <input type="file" id="csv-upload" accept=".csv" hidden>
                        <p class="csv-hint">CSV should have a "Name" column, or one name per row</p>
                    </div>

                    <button id="load-names">Load Names</button>
                </div>
            </section>

            <section class="stats">
                <section class="options">
                    <div class="group-size">
                        <label for="group-size">Group Size:</label>
                        <input type="number" id="group-size" min="1" value="5" max="25">
                    </div>
                    <button id="pick-button">Pick Random Group</button>
                    <div class="deselect-after-picked">
                        <label for="deselect-after-picked">Deselect After Picked</label>
                        <input type="checkbox" id="deselect-after-picked">
                    </div>
                </section>

                <section class="result">
                    <h2>Random Group:</h2>
                    <p id="result-text">Load names to get started</p>
                </section>
            </section>

            <section class="people-section" id="people-section" style="display: none;">
                <div class="people-header">
                    <h2>People (<span id="people-count">0</span>)</h2>
                    <div class="people-actions">
                        <button id="select-all">Select All</button>
                        <button id="deselect-all">Deselect All</button>
                        <button id="clear-all" class="danger-btn">Clear All</button>
                    </div>
                </div>
                <div class="list-of-people" id="people-list"></div>
            </section>
        </main>
        <footer></footer>
        <script>
            const footer = document.querySelector("footer");
            const currentYear = new Date().getFullYear();
            footer.innerHTML = `&copy; Arpan Shah ${currentYear}`;
        </script>

        <script src="./script.js"></script>
    </body>
</html>
